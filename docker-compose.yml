services:
  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: "123456789123456789"
      MEILI_EXPERIMENTAL_ALLOWED_IP_NETWORKS: "172.16.0.0/12"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - diogenes

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/ollama-entrypoint.sh
    entrypoint: ["/bin/sh", "/ollama-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - diogenes

networks:
  diogenes:
    driver: bridge

volumes:
  meilisearch_data:
  ollama_data:
